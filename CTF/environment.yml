name: climate-forecasting
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # Core
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11

  # Visualisation
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.18

  # Statistics / time-series
  - statsmodels>=0.14

  # ML baselines
  - scikit-learn>=1.4
  - xgboost>=2.0
  - lightgbm>=4.0
  - joblib>=1.3

  # Utilities
  - requests>=2.31
  - tqdm>=4.66
  - pyyaml>=6.0

  # Notebook
  - jupyter
  - ipykernel
  - nbformat

  # pip-only packages
  - pip
  - pip:
    - tensorflow>=2.15.0,<2.18.0
    - kaleido>=0.2.1

# Activate with:
#   conda env create -f environment.yml
#   conda activate climate-forecasting
#
# Update existing env:
#   conda env update -f environment.yml --prune
